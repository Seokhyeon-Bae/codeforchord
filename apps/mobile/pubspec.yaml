name: codeforchord
description: AI-Powered Music Transcription App

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.1
  
  # HTTP Client
  dio: ^5.4.0
  
  # Audio Recording
  record: ^5.0.4
  permission_handler: ^11.1.0
  path_provider: ^2.1.1
  
  # File Picker
  file_picker: ^6.1.1
  
  # Music Sheet Display
  flutter_svg: ^2.0.9
  webview_flutter: ^4.4.4
  
  # UI
  google_fonts: ^6.1.0
  flutter_animate: ^4.3.0
  
  # Utils
  intl: ^0.18.1
  uuid: ^4.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
